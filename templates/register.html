{% extends "base.html" %}

{% block title %}User Registration - SecureAI{% endblock %}

{% block content %}
<div class="container mx-auto p-6 max-w-lg">
    <!-- Registration Form Section -->
    <section class="bg-gray-800 bg-opacity-80 rounded-lg p-8 shadow-lg animate-slide-up">
        <h2 class="text-3xl font-bold mb-6 text-center flex items-center justify-center space-x-2">
            <i class="fas fa-user-plus text-indigo-400"></i>
            <span>User Registration</span>
        </h2>
        {% if msg %}
        <div class="mb-6 p-4 bg-green-600 bg-opacity-80 rounded-lg text-white text-center animate-fade-in">
            <i class="fas fa-check-circle mr-2"></i>{{ msg }}
        </div>
        {% endif %}
        <!-- Form -->
        <div class="form-container">
            <form method="post" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                <!-- Name Field -->
                <div class="flex items-center space-x-2">
                    <i class="fas fa-user text-purple-400"></i>
                    <div class="flex-1">
                        <label for="name" class="block text-sm font-medium text-gray-300">Name</label>
                        <input type="text" name="name" id="name" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700 focus:outline-none focus:border-indigo-400 transition-all duration-300" required>
                    </div>
                </div>
                <!-- Email Field -->
                <div class="flex items-center space-x-2">
                    <i class="fas fa-envelope text-purple-400"></i>
                    <div class="flex-1">
                        <label for="email" class="block text-sm font-medium text-gray-300">Email</label>
                        <input type="email" name="email" id="email" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700 focus:outline-none focus:border-indigo-400 transition-all duration-300" required>
                    </div>
                </div>
                <!-- Mobile Field -->
                <div class="flex items-center space-x-2">
                    <i class="fas fa-phone text-purple-400"></i>
                    <div class="flex-1">
                        <label for="mobile" class="block text-sm font-medium text-gray-300">Mobile</label>
                        <input type="text" name="mobile" id="mobile" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700 focus:outline-none focus:border-indigo-400 transition-all duration-300" required>
                    </div>
                </div>
                <!-- Password Field -->
                <div class="flex items-center space-x-2">
                    <i class="fas fa-lock text-purple-400"></i>
                    <div class="flex-1">
                        <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                        <div class="relative">
                            <input type="password" name="password" id="password" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700 focus:outline-none focus:border-indigo-400 transition-all duration-300" required>
                            <i class="fas fa-eye absolute right-3 top-4 text-gray-400 cursor-pointer hover:text-indigo-400 transition-colors" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password'; this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');"></i>
                        </div>
                    </div>
                </div>
                <!-- Image Field -->
                <div class="flex items-center space-x-2">
                    <i class="fas fa-image text-purple-400"></i>
                    <div class="flex-1">
                        <label for="image" class="block text-sm font-medium text-gray-300">Profile Image</label>
                        <input type="file" name="image" id="image" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700 focus:outline-none focus:border-indigo-400 transition-all duration-300">
                    </div>
                </div>
                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit" class="btn-3d bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold flex items-center justify-center mx-auto space-x-2 transform hover:scale-105 transition-all duration-300">
                        <i class="fas fa-rocket"></i>
                        <span>Register</span>
                    </button>
                </div>
            </form>
        </div>
    </section>
</div>

<!-- Custom CSS for animations -->
<style>
    .animate-fade-in {
        animation: fadeIn 1s ease-in-out;
    }
    .animate-slide-up {
        animation: slideUp 1s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<!-- JavaScript for form input animations -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('i').classList.add('text-indigo-400');
                input.parentElement.querySelector('i').classList.remove('text-purple-400');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('i').classList.add('text-purple-400');
                input.parentElement.querySelector('i').classList.remove('text-indigo-400');
            });
        });
    });
</script>
{% endblock %}
