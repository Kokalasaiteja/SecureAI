<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Home - SecureAI</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Custom 3D button styles */
        .btn-3d {
            position: relative;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }
        .btn-3d:hover {
            transform: translateY(-4px) rotateX(10deg) rotateY(10deg);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        /* Gradient background animation */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .gradient-bg {
            background: linear-gradient(45deg, #6366f1, #a78bfa, #ec4899, #3b82f6);
            background-size: 400%;
            animation: gradient 15s ease infinite;
        }
        /* Animations */
        .animate-fade-in {
            animation: fadeIn 1s ease-in-out;
        }
        .animate-slide-up {
            animation: slideUp 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col gradient-bg text-white">
    <!-- Header -->
    <header class="bg-gray-900 bg-opacity-90 backdrop-blur-md p-4 shadow-lg fixed w-full z-10">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold flex items-center space-x-2">
                <i class="fas fa-shield-alt text-indigo-400"></i>
                <span>SecureAI Admin</span>
            </div>
            <nav>
                <ul class="flex space-x-6">
                    <li>
                        <a href="{% url 'admin_dashboard' %}" class="flex items-center space-x-2 text-lg font-medium hover:text-indigo-400 transition-all duration-300">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'user_logout' %}" class="flex items-center space-x-2 text-lg font-medium hover:text-indigo-400 transition-all duration-300">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto mt-24 p-6 flex-grow">
        <section class="text-center py-12 animate-slide-up">
            <h1 class="text-5xl font-bold mb-4 flex items-center justify-center space-x-2">
                <i class="fas fa-user-shield text-indigo-400"></i>
                <span>Welcome, Admin!</span>
            </h1>
            <p class="text-xl text-gray-300 mb-8 animate-fade-in">
                Manage SecureAI’s AI-driven defenses against social engineering attacks.
            </p>
            <div class="flex justify-center space-x-4">
                <a href="{% url 'admin_dashboard' %}" class="btn-3d bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold flex items-center space-x-2 transform hover:scale-105 transition-all duration-300">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Go to Dashboard</span>
                </a>
                <a href="{% url 'user_logout' %}" class="btn-3d bg-purple-600 text-white px-8 py-3 rounded-lg font-semibold flex items-center space-x-2 transform hover:scale-105 transition-all duration-300">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 bg-opacity-90 p-4 text-center">
        <p>© 2025 SecureAI. All rights reserved.</p>
    </footer>

    <!-- JavaScript for page load animation -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = 0;
            main.style.transform = 'translateY(20px)';
            setTimeout(() => {
                main.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                main.style.opacity = 1;
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
