{% extends "base.html" %}

{% block title %}Verify OTP - SecureAI{% endblock %}

{% block content %}
<div class="container mx-auto p-6 max-w-lg">
    <!-- Verify OTP Form Section -->
    <section class="bg-gray-800 bg-opacity-80 rounded-lg p-8 shadow-lg animate-slide-up">
        <div class="text-center mb-6">
            <i class="fas fa-shield-alt text-indigo-400 text-5xl mb-4"></i>
            <h2 class="text-3xl font-bold flex items-center justify-center space-x-2">
                <span>Verify OTP</span>
            </h2>
            <p class="text-gray-300 mt-2">Enter the 6-digit code sent to your email</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
            <div class="mb-6 p-4 bg-red-600 bg-opacity-80 rounded-lg text-white text-center animate-fade-in">
                <i class="fas fa-exclamation-circle mr-2"></i>{{ message }}
            </div>
            {% endfor %}
        {% endif %}
        
        <!-- Form -->
        <div class="form-container">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <!-- OTP Field -->
                <div class="flex items-center space-x-2">
                    <i class="fas fa-lock text-purple-400"></i>
                    <div class="flex-1">
                        <label for="otp" class="block text-sm font-medium text-gray-300">One-Time Password</label>
                        <input type="text" name="otp" id="otp" maxlength="6" pattern="[0-9]{6}" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700 focus:outline-none focus:border-indigo-400 transition-all duration-300 text-center text-2xl tracking-widest" placeholder="000000" required>
                    </div>
                </div>
                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit" class="btn-3d bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold flex items-center justify-center mx-auto space-x-2 transform hover:scale-105 transition-all duration-300">
                        <i class="fas fa-check-circle"></i>
                        <span>Verify OTP</span>
                    </button>
                </div>
                <!-- Resend OTP Link -->
                <div class="text-center">
                    <a href="{% url 'forgot_password' %}" class="text-indigo-400 hover:text-indigo-300 transition-all duration-300 flex items-center justify-center space-x-2">
                        <i class="fas fa-redo"></i>
                        <span>Resend OTP</span>
                    </a>
                </div>
            </form>
        </div>
    </section>
</div>

<!-- Custom CSS for animations -->
<style>
    .animate-fade-in {
        animation: fadeIn 1s ease-in-out;
    }
    .animate-slide-up {
        animation: slideUp 1s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<!-- JavaScript for OTP input -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const otpInput = document.getElementById('otp');
        const icon = document.querySelector('.fa-lock');
        
        otpInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
        
        otpInput.addEventListener('focus', () => {
            icon.classList.add('text-indigo-400');
            icon.classList.remove('text-purple-400');
        });
        
        otpInput.addEventListener('blur', () => {
            icon.classList.add('text-purple-400');
            icon.classList.remove('text-indigo-400');
        });
    });
</script>
{% endblock %}
