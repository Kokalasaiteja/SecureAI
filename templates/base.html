<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Management System{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Custom 3D button styles */
        .btn-3d {
            position: relative;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }
        .btn-3d:hover {
            transform: translateY(-4px) rotateX(10deg) rotateY(10deg);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        /* Navbar animation */
        .nav-item {
            transition: all 0.3s ease;
        }
        .nav-item:hover {
            transform: translateY(-2px);
            color: #a78bfa;
        }
        /* Animated Gradient Background */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .gradient-bg {
            background: linear-gradient(45deg, #4f46e5, #ec4899, #8b5cf6, #3b82f6);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        
        /* Interactive Particles Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Ultimate Glassmorphism */
        .bg-gray-800.bg-opacity-80, .bg-gray-900.bg-opacity-90, .bg-gray-900, .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background-color: rgba(0, 0, 0, 0.45) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.6); }

        /* Glowing Text */
        h1, h2 { text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); }
    </style>
    <!-- Particles.js CDN -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body class="min-h-screen flex flex-col gradient-bg text-white relative">
    <div id="particles-js"></div>
    <!-- Navbar -->
    <nav class="bg-gray-900 bg-opacity-90 backdrop-blur-md p-4 shadow-lg fixed w-full z-10">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold flex items-center space-x-2">
                <i class="fas fa-shield-alt text-indigo-400"></i>
                <span>Usage_of_AI_in_Prevention_of_Social_Engineering_Attack</span>
            </div>
            <ul class="flex space-x-2">
                <li class="nav-item w-32">
                    <a href="/" class="flex flex-col items-center justify-center text-center p-2 rounded hover:bg-gray-800 transition-all duration-300">
                        <i class="fas fa-home text-xl mb-1"></i>
                        <span class="text-sm font-medium">Home</span>
                    </a>
                </li>
                <li class="nav-item w-32">
                    <a href="{% url 'introduction' %}" class="flex flex-col items-center justify-center text-center p-2 rounded hover:bg-gray-800 transition-all duration-300">
                        <i class="fas fa-book-open text-xl mb-1"></i>
                        <span class="text-sm font-medium">Introduction</span>
                    </a>
                </li>
                <li class="nav-item w-32">
                    <a href="{% url 'contact' %}" class="flex flex-col items-center justify-center text-center p-2 rounded hover:bg-gray-800 transition-all duration-300">
                        <i class="fas fa-envelope text-xl mb-1"></i>
                        <span class="text-sm font-medium">Contact Us</span>
                    </a>
                </li>
                <li class="nav-item w-32">
                    <a href="{% url 'register' %}" class="flex flex-col items-center justify-center text-center p-2 rounded hover:bg-gray-800 transition-all duration-300">
                        <i class="fas fa-user-plus text-xl mb-1"></i>
                        <span class="text-sm font-medium">Register</span>
                    </a>
                </li>
                <li class="nav-item w-32">
                    <a href="{% url 'user_login' %}" class="flex flex-col items-center justify-center text-center p-2 rounded hover:bg-gray-800 transition-all duration-300">
                        <i class="fas fa-sign-in-alt text-xl mb-1"></i>
                        <span class="text-sm font-medium">User Login</span>
                    </a>
                </li>
                <li class="nav-item w-32">
                    <a href="{% url 'admin_login' %}" class="flex flex-col items-center justify-center text-center p-2 rounded hover:bg-gray-800 transition-all duration-300">
                        <i class="fas fa-lock text-xl mb-1"></i>
                        <span class="text-sm font-medium">Admin Login</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto mt-24 p-6 flex-grow">
        {% block content %}

        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 bg-opacity-90 p-4 text-center">
<p>&copy; 2026 SecureAI. All rights reserved.</p>
    </footer>

    <!-- JavaScript for additional interactivity -->
    <script>
        // Add animation for page load
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = 0;
            main.style.transform = 'translateY(30px) scale(0.98)';
            setTimeout(() => {
                main.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                main.style.opacity = 1;
                main.style.transform = 'translateY(0) scale(1)';
            }, 100);

            // Initialize Particles.js for interactive background
            if(window.particlesJS) {
                particlesJS("particles-js", {
                  "particles": {
                    "number": {"value": 80, "density": {"enable": true, "value_area": 800}},
                    "color": {"value": ["#ffffff"]},
                    "shape": {"type": "circle"},
                    "opacity": {"value": 0.4, "random": true},
                    "size": {"value": 3, "random": true},
                    "line_linked": {"enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1},
                    "move": {"enable": true, "speed": 2, "direction": "none", "random": true, "out_mode": "out"}
                  },
                  "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                      "onhover": {"enable": true, "mode": "grab"},
                      "onclick": {"enable": true, "mode": "push"},
                      "resize": true
                    },
                    "modes": {
                      "grab": {"distance": 200, "line_linked": {"opacity": 0.5}},
                      "push": {"particles_nb": 4}
                    }
                  },
                  "retina_detect": true
                });
            }
        });
    </script>
</body>
</html>
