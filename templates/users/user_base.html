<!-- users/user_base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}User Panel - SecureAI{% endblock %}</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

  <style>
    /* Custom 3D Button */
    .btn-3d {
      position: relative;
      transition: all 0.3s ease;
      transform-style: preserve-3d;
    }
    .btn-3d:hover {
      transform: translateY(-4px) rotateX(5deg) rotateY(5deg);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }
    .btn-3d:active {
      transform: translateY(2px);
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
    }

    /* Sidebar Hover Effect */
    .nav-item {
      transition: all 0.3s ease;
    }
    .nav-item:hover {
      background-color: #115e59;
      transform: translateX(6px);
    }

    /* Animated Gradient Background */
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .gradient-bg {
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }

    /* Interactive Particles Background */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* Ultimate Glassmorphism */
    .bg-gray-800.bg-opacity-80, .bg-gray-900.bg-opacity-90, .bg-gray-900, aside, footer {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background-color: rgba(0, 0, 0, 0.45) !important;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.6); }

    /* Glowing Text */
    h1, h2 { text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); }

    /* Slide-up Animation */
    .animate-slide-up {
      animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
  <!-- Particles.js CDN -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>

<body class="min-h-screen flex {% block bg_color %}bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 gradient-bg{% endblock %} text-white relative">
  <div id="particles-js"></div>
  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 bg-opacity-90 h-screen fixed p-6 shadow-lg">
    <div class="flex items-center space-x-2 mb-8">
      <i class="fas fa-user-shield text-teal-400 text-2xl"></i>
      <h1 class="text-2xl font-bold">SecureAI Panel</h1>
    </div>
    <nav class="space-y-4">
      <a href="{% url 'user_homepage' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-teal-400 p-2 rounded-lg">
        <i class="fas fa-home"></i> <span>Home</span>
      </a>
      <a href="{% url 'detect_spam' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-teal-400 p-2 rounded-lg">
        <i class="fas fa-sms"></i> <span>SMS Spam Detection</span>
      </a>
      <a href="{% url 'qr-scan' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-teal-400 p-2 rounded-lg">
        <i class="fas fa-qrcode"></i> <span>QR Code Scanner</span>
      </a>
      <a href="{% url 'predict_anomaly' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-teal-400 p-2 rounded-lg">
        <i class="fas fa-user-secret w-6"></i> <span>Behavior Analysis</span>
      </a>
      <a href="{% url 'password_analyzer' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-teal-400 p-2 rounded-lg">
        <i class="fas fa-shield-alt w-6"></i> <span>Password Analyzer</span>
      </a>
      <a href="{% url 'email_phishing_analyzer' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-teal-400 p-2 rounded-lg">
        <i class="fas fa-envelope-open-text w-6"></i> <span>Email Phishing</span>
      </a>
      <a href="{% url 'train_anomaly_model' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-teal-400 p-2 rounded-lg">
        <i class="fas fa-brain w-6"></i> <span>Train ML Models</span>
      </a>
      <a href="{% url 'user_logout' %}" class="nav-item flex items-center space-x-2 text-lg font-medium text-gray-300 hover:text-red-400 p-2 rounded-lg">
        <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 p-6 flex-grow animate-slide-up">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-64 right-0 bg-gray-900 bg-opacity-90 p-4 text-center">
<p>© 2026 SecureAI. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Particles.js for interactive background
      if(window.particlesJS) {
          particlesJS("particles-js", {
            "particles": {
              "number": {"value": 80, "density": {"enable": true, "value_area": 800}},
              "color": {"value": ["#ffffff"]},
              "shape": {"type": "circle"},
              "opacity": {"value": 0.4, "random": true},
              "size": {"value": 3, "random": true},
              "line_linked": {"enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1},
              "move": {"enable": true, "speed": 2, "direction": "none", "random": true, "out_mode": "out"}
            },
            "interactivity": {
              "detect_on": "canvas",
              "events": {
                "onhover": {"enable": true, "mode": "grab"},
                "onclick": {"enable": true, "mode": "push"},
                "resize": true
              },
              "modes": {
                "grab": {"distance": 200, "line_linked": {"opacity": 0.5}},
                "push": {"particles_nb": 4}
              }
            },
            "retina_detect": true
          });
      }
    });
  </script>
</body>
</html>
